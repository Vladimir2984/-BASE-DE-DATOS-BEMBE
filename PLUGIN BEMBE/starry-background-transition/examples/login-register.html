<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Consistente</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
</head>
<body>
    <div class="login-register-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Iniciar sesión</h1>
                <p>Accede a tu cuenta</p>
            </div>
            <div class="login-body">
                <form class="form-container">
                    <h2 class="form-title">Iniciar sesión</h2>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <input type="checkbox" id="remember" name="remember">
                                <label for="remember" style="margin-left: 0.5rem;">Recordarme</label>
                            </div>
                            <a href="#" style="color: var(--primary-color); text-decoration: none;">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                </form>
            </div>
            <div class="login-footer">
                ¿No tienes una cuenta? <a href="#">Regístrate ahora</a>
            </div>
        </div>
    </div>
</body>
</html>
