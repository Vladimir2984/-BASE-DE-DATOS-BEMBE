<style>

<script>
// ==================== DATA STORE ====================
const DEFAULT_PRICES = [
{ name: 'Clase Prueba', hours: 1, price: 400, d1: 0, d2: 0, editable: false },
{ name: 'Clase Suelta', hours: 1, price: 600, d1: 0, d2: 0, editable: false },
{ name: 'Abono 4 Horas', hours: 4, price: 2000, d1: 1800, d2: 1700, editable: true },
{ name: 'Abono 8 Horas', hours: 8, price: 3500, d1: 3150, d2: 3000, editable: true },
{ name: 'Abono 12 Horas', hours: 12, price: 4500, d1: 4050, d2: 3800, editable: true },
{ name: 'Abono 16 Horas', hours: 16, price: 5500, d1: 4950, d2: 4700, editable: true },
{ name: 'Ilimitado', hours: 99, price: 7000, d1: 6300, d2: 6000, editable: true },
];
function todayStr() {
const d = new Date();
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function nextMonthStr() {
const d = new Date();
d.setMonth(d.getMonth() + 1);
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
let appData = {
students: [],
teachers: [],
renters: [],
debtRecords: [],
history: [],
schedule: {},
prices: JSON.parse(JSON.stringify(DEFAULT_PRICES)),
};
function loadData() {
try {
const raw = localStorage.getItem('bembe_app_data');
if (raw) {
const parsed = JSON.parse(raw);
appData = {
students: parsed.students || [],
teachers: parsed.teachers || [],
renters: parsed.renters || [],
debtRecords: parsed.debtRecords || [],
history: parsed.history || [],
schedule: parsed.schedule || {},
prices: parsed.prices || JSON.parse(JSON.stringify(DEFAULT_PRICES)),
};
}
} catch(e) { console.error('Error loading data:', e); }
}
function saveData() {
try {
localStorage.setItem('bembe_app_data', JSON.stringify(appData));
} catch(e) { 
  console.error('Error saving data:', e);
  showToast("⚠️ Error al guardar datos. Espacio insuficiente o datos corruptos");
  // Auto-export backup
  handleExport();
}
}
// ==================== STARRY BACKGROUND ====================
function initStarryBg() {
const canvas = document.getElementById('starCanvas');
if (!canvas) return;
const ctx = canvas.getContext('2d');
let frame = 0;
const stars = [];
const colors = ['255,255,255','200,220,255','180,200,255','255,240,210','180,230,255'];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function init() {
resize();
stars.length = 0;
for (let i = 0; i < 350; i++) {
stars.push({
x: Math.random()*canvas.width, y: Math.random()*canvas.height,
r: Math.random()*1.8+0.2, baseOp: Math.random()*0.5+0.2,
tSpeed: Math.random()*0.025+0.005, tOff: Math.random()*Math.PI*2,
color: colors[Math.floor(Math.random()*colors.length)],
});
}
}
init();
window.addEventListener('resize', resize);
function drawNeb(cx,cy,rad,col) {
const g = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
g.addColorStop(0,col); g.addColorStop(1,'transparent');
ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
}
function animate() {
const w=canvas.width, h=canvas.height;
const bg = ctx.createLinearGradient(0,0,w*0.4,h);
bg.addColorStop(0,'#020a18'); bg.addColorStop(0.25,'#071a35');
bg.addColorStop(0.5,'#0c2248'); bg.addColorStop(0.75,'#091d3a'); bg.addColorStop(1,'#040e1f');
ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
drawNeb(w*0.15,h*0.25,w*0.45,'rgba(30,64,175,0.035)');
drawNeb(w*0.8,h*0.65,w*0.35,'rgba(99,40,180,0.025)');
drawNeb(w*0.5,h*0.8,w*0.3,'rgba(6,182,212,0.02)');
drawNeb(w*0.7,h*0.2,w*0.25,'rgba(251,191,36,0.012)');
stars.forEach(s => {
const op = Math.max(0.05,Math.min(1,s.baseOp+Math.sin(frame*s.tSpeed+s.tOff)*0.35));
ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle = `rgba(${s.color},${op})`; ctx.fill();
if (s.r > 1.2) {
ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);
ctx.fillStyle = `rgba(${s.color},${op*0.06})`; ctx.fill();
}
});
frame++;
requestAnimationFrame(animate);
}

function renderCalendar() {

}
grid.innerHTML = html;
}

// ==================== SECURITY UTILITIES ====================
// Simple hash function for checksum validation
function generateChecksum(data) {
  let hash = 0;
  const str = JSON.stringify(data);
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return Math.abs(hash).toString(36);
}

// Sanitize string to prevent XSS
function sanitizeString(str) {
  if (typeof str !== 'string') return str;
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Sanitize all string fields in an object
function sanitizeObject(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  const sanitized = {};
  for (const key in obj) {
    if (typeof obj[key] === 'string') {
      sanitized[key] = sanitizeString(obj[key]);
    } else if (typeof obj[key] === 'object') {
      sanitized[key] = sanitizeObject(obj[key]);
    } else {
      sanitized[key] = obj[key];
    }
  }
  return sanitized;
}

// Sanitize entire app data structure
function sanitizeAppData(data) {
  const sanitized = {
    students: (data.students || []).map(sanitizeObject),
    teachers: (data.teachers || []).map(sanitizeObject),
    renters: (data.renters || []).map(sanitizeObject),
    debtRecords: (data.debtRecords || []).map(sanitizeObject),
    history: (data.history || []).map(sanitizeObject),
    schedule: data.schedule || {},
    prices: (data.prices || []).map(sanitizeObject),
  };
  return sanitized;
}

// Simple password-based encoding (Base64 + XOR)
function encodeWithPassword(data, password) {
  const jsonStr = JSON.stringify(data);
  let encoded = '';
  for (let i = 0; i < jsonStr.length; i++) {
    const charCode = jsonStr.charCodeAt(i) ^ password.charCodeAt(i % password.length);
    encoded += String.fromCharCode(charCode);
  }
  return btoa(encoded);
}

// Decode password-protected data
function decodeWithPassword(encodedStr, password) {
  try {
    const decoded = atob(encodedStr);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      const charCode = decoded.charCodeAt(i) ^ password.charCodeAt(i % password.length);
      result += String.fromCharCode(charCode);
    }
    return JSON.parse(result);
  } catch (err) {
    throw new Error('Contraseña incorrecta o archivo corrupto');
  }
}

// Create secure export package with metadata
function createExportPackage(data, password = null) {
  const exportData = {
    version: '2.0.0',
    timestamp: Date.now(),
    checksum: generateChecksum(data),
    data: data,
    metadata: {
      exportDate: new Date().toISOString(),
      appVersion: 'BEMBE-2.0.0',
      recordCount: {
        students: data.students.length,
        teachers: data.teachers.length,
        renters: data.renters.length,
        debtRecords: data.debtRecords.length,
        history: data.history.length
      }
    }
  };
  
  if (password) {
    return {
      ...exportData,
      encrypted: true,
      payload: encodeWithPassword(exportData, password)
    };
  }
  
  return exportData;
}

// Validate and decrypt import package
function validateImportPackage(imported, password = null) {
  // Check version compatibility
  if (!imported.version) {
    return { valid: false, error: 'Archivo de exportación antiguo o inválido' };
  }
  
  let data;
  
  // Decrypt if necessary
  if (imported.encrypted) {
    if (!password) {
      return { valid: false, error: 'Este archivo está protegido con contraseña', requiresPassword: true };
    }
    try {
      data = decodeWithPassword(imported.payload, password);
    } catch (err) {
      return { valid: false, error: err.message };
    }
  } else {
    data = imported.data;
  }
  
  // Validate checksum
  if (imported.checksum && generateChecksum(data) !== imported.checksum) {
    return { valid: false, error: 'El archivo está corrupto o ha sido modificado' };
  }
  
  // Sanitize all data
  const sanitizedData = sanitizeAppData(data);
  
  // Validate structure
  const validation = validateImportData(sanitizedData);
  if (!validation.valid) {
    return validation;
  }
  
  return { valid: true, data: sanitizedData, summary: validation.summary, metadata: imported.metadata };
}

function createAutoBackup() {
try {
  const backupKey = 'bembe_auto_backup_' + todayStr();
  const existingBackup = localStorage.getItem(backupKey);
  if (existingBackup) {
    return;
  }
  
  // Create backup with checksum for integrity
  const backupData = {
    version: '2.0.0',
    timestamp: Date.now(),
    checksum: generateChecksum(appData),
    data: appData
  };
  
  localStorage.setItem(backupKey, JSON.stringify(backupData));
  
  // Rotate old backups (keep last 7 days)
  rotateOldBackups();
  
  showToast('💾 Respaldo automático creado con verificación de integridad');
} catch(err) {
  console.error('Backup error:', err);
}
}

// Rotate old backups - keep only last 7 days
function rotateOldBackups() {
  try {
    const keysToRemove = [];
    const cutoffDate = new Date();
    cutoffDate.setDate(cutoffDate.getDate() - 7);
    
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('bembe_auto_backup_')) {
        const dateStr = key.replace('bembe_auto_backup_', '');
        const backupDate = new Date(dateStr);
        if (backupDate < cutoffDate) {
          keysToRemove.push(key);
        }
      }
    }
    
    keysToRemove.forEach(key => localStorage.removeItem(key));
    
    if (keysToRemove.length > 0) {
      console.log(`Rotated ${keysToRemove.length} old backups`);
    }
  } catch (err) {
    console.error('Error rotating backups:', err);
  }
}

function validateImportData(imported) {
// Validate required fields exist
const requiredFields = ['students', 'teachers', 'renters', 'debtRecords', 'history', 'schedule', 'prices'];
const missingFields = requiredFields.filter(field => !(field in imported));
if (missingFields.length > 0) {
return { valid: false, error: `Campos faltantes: ${missingFields.join(', ')}` };
}
// Validate data types
if (!Array.isArray(imported.students)) return { valid: false, error: 'students debe ser un array' };
if (!Array.isArray(imported.teachers)) return { valid: false, error: 'teachers debe ser un array' };
if (!Array.isArray(imported.renters)) return { valid: false, error: 'renters debe ser un array' };
if (!Array.isArray(imported.debtRecords)) return { valid: false, error: 'debtRecords debe ser un array' };
if (!Array.isArray(imported.history)) return { valid: false, error: 'history debe ser un array' };
if (typeof imported.schedule !== 'object') return { valid: false, error: 'schedule debe ser un objeto' };
if (!Array.isArray(imported.prices)) return { valid: false, error: 'prices debe ser un array' };

// Validate and sanitize student structure
for (let i = 0; i < imported.students.length; i++) {
const s = imported.students[i];
if (!s.id || !s.surname || !s.name) {
return { valid: false, error: `Estudiante ${i+1} inválido: falta id, surname o name` };
}
// Validate field lengths to prevent abuse
if (s.surname.length > 100 || s.name.length > 100) {
  return { valid: false, error: `Estudiante ${i+1}: nombre o apellido demasiado largo (máx 100 caracteres)` };
}
if (s.phone && s.phone.length > 20) {
  return { valid: false, error: `Estudiante ${i+1}: número de teléfono demasiado largo` };
}
}

// Validate teachers
for (let i = 0; i < imported.teachers.length; i++) {
  const t = imported.teachers[i];
  if (t.name && t.name.length > 100) {
    return { valid: false, error: `Profesor ${i+1}: nombre demasiado largo` };
  }
}

// Check file size estimate
const estimatedSize = JSON.stringify(imported).length;
if (estimatedSize > 5 * 1024 * 1024) { // 5MB limit
return { valid: false, error: 'Archivo demasiado grande (>5MB)' };
}
return { valid: true, summary: {
students: imported.students.length,
teachers: imported.teachers.length,
renters: imported.renters.length,
debtRecords: imported.debtRecords.length,
history: imported.history.length
}};
}

function processImport(event) {
const file = event.target.files[0];
if (!file) return;

// Validate file type
if (!file.name.toLowerCase().endsWith('.json')) {
showToast('❌ Error: El archivo debe ser .json');
event.target.value = '';
return;
}

// Validate file size
if (file.size > 10 * 1024 * 1024) { // 10MB hard limit
showToast('❌ Error: Archivo demasiado grande (>10MB)');
event.target.value = '';
return;
}

const reader = new FileReader();
reader.onload = function(e) {
try {
const imported = JSON.parse(e.target.result);

// Use new secure validation with checksum and sanitization
const validation = validateImportPackage(imported);

if (!validation.valid) {
  if (validation.requiresPassword) {
    // Show password prompt
    showPasswordPrompt(file, (password) => {
      const retryValidation = validateImportPackage(imported, password);
      if (!retryValidation.valid) {
        showToast('❌ Error: ' + retryValidation.error);
        event.target.value = '';
        return;
      }
      proceedWithImport(retryValidation, file, event);
    });
  } else {
    showToast('❌ Error: ' + validation.error);
    event.target.value = '';
    return;
  }
} else {
  proceedWithImport(validation, file, event);
}

} catch(err) {
console.error('Import error:', err);
showToast('❌ Error al importar: archivo JSON inválido o corrupto');
event.target.value = '';

// Show password prompt for encrypted files
function showPasswordPrompt(file, onSuccess) {
  const promptHtml = `
    <div style="display:flex;flex-direction:column;gap:16px;padding:20px;">
      <div style="text-align:center;">
        <div style="font-size:3rem;margin-bottom:8px;">🔒</div>
        <h2 style="color:#fbbf24;font-size:1.25rem;font-weight:700;">Archivo Protegido</h2>
        <p style="color:rgba(147,197,253,0.7);font-size:0.875rem;margin-top:8px;">
          Este archivo está protegido con contraseña. Ingresa la contraseña para continuar.
        </p>
      </div>
      <div>
        <label class="field-label">🔑 Contraseña:</label>
        <input type="password" class="input-modern" id="importPasswordInput" placeholder="Ingresa la contraseña" onkeypress="if(event.key==='Enter'){document.getElementById('passwordSubmitBtn').click();}">
      </div>
      <div id="passwordError" style="color:#f87171;font-size:0.75rem;display:none;"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;">
        <button class="btn-modern btn-red" onclick="document.getElementById('passwordResult').dataset.result='cancel';closeModal()">
          ❌ Cancelar
        </button>
        <button class="btn-modern btn-gold" id="passwordSubmitBtn" onclick="submitPassword()">
          ✅ Desbloquear
        </button>
      </div>
    </div>
  `;
  openModalRaw(promptHtml, 'max-w-xl');
  
  // Store callback for later use
  window._passwordCallback = onSuccess;
  
  // Add submit function to window
  window.submitPassword = function() {
    const password = document.getElementById('importPasswordInput').value;
    if (!password) {
      document.getElementById('passwordError').textContent = 'La contraseña es requerida';
      document.getElementById('passwordError').style.display = 'block';
      return;
    }
    document.getElementById('passwordResult').dataset.result = 'submit';
    closeModal();
  };
  
  // Wait for result
  const resultTracker = document.createElement('div');
  resultTracker.id = 'passwordResult';
  resultTracker.dataset.result = '';
  resultTracker.style.display = 'none';
  document.body.appendChild(resultTracker);
  
  const checkInterval = setInterval(() => {
    if (resultTracker.dataset.result === 'submit') {
      clearInterval(checkInterval);
      const password = document.getElementById('importPasswordInput').value;
      resultTracker.remove();
      if (window._passwordCallback) {
        window._passwordCallback(password);
        window._passwordCallback = null;
      }
    } else if (resultTracker.dataset.result === 'cancel') {
      clearInterval(checkInterval);
      resultTracker.remove();
      showToast('⚠️ Importación cancelada');
    }
  }, 200);
}

// Proceed with import after validation
function proceedWithImport(validation, file, event) {
const confirmPromise = new Promise((resolve, reject) => {
const resultTracker = document.createElement('div');
resultTracker.id = 'importConfirmResult';
resultTracker.dataset.result = '';
resultTracker.style.display = 'none';
document.body.appendChild(resultTracker);
showImportConfirmation(validation.summary, file, resolve, reject);
});

confirmPromise.then(() => {
// User confirmed - apply import with sanitized data
appData = validation.data;
saveData();
renderAll();
showToast('✅ Datos importados correctamente con verificación de integridad');

// Save import history with metadata
const importHistory = JSON.parse(localStorage.getItem('bembe_import_history') || '[]');
importHistory.unshift({
date: Date.now(),
file: file.name,
summary: validation.summary,
checksum: validation.data ? generateChecksum(validation.data) : 'N/A',
metadata: validation.metadata || {}
});
if (importHistory.length > 10) importHistory.pop();
localStorage.setItem('bembe_import_history', JSON.stringify(importHistory));
}).catch((err) => {
console.log('Import cancelled:', err.message);
showToast('⚠️ Importación cancelada');
});

event.target.value = '';
}
function restoreAutoBackup() {
const backupKey = 'bembe_auto_backup_' + todayStr();
const backup = localStorage.getItem(backupKey);
if (!backup) {
showToast('⚠️ No hay respaldo disponible para hoy');
return;
}
if (confirm('¿Restaurar respaldo automático de hoy? Esto reemplazará los datos actuales.')) {
try {
const backupData = JSON.parse(backup);

// Validate checksum if available
if (backupData.checksum && backupData.data) {
  const currentChecksum = generateChecksum(backupData.data);
  if (currentChecksum !== backupData.checksum) {
    showToast('❌ Error: El respaldo está corrupto o ha sido modificado');
    return;
  }
  appData = backupData.data;
} else {
  // Fallback for old backup format
  appData = backupData;
}

saveData();
renderAll();
showToast('✅ Respaldo restaurado correctamente con verificación de integridad');
} catch(err) {
showToast('❌ Error al restaurar: ' + err.message);
}
}
}

function autoFillSubName() {
const surnameInput = document.getElementById('sfSurname');
if (!surnameInput) return;
const val = surnameInput.value.trim();
// Try to find matching student
const s = appData.students.find(st => {
const full = `${st.surname} ${st.name}`;
return full === val || st.surname.toLowerCase() === val.toLowerCase();
});
if (s) {
const nameInput = document.getElementById('sfName');
if (nameInput && !nameInput.value) nameInput.value = s.name;
// If full name matched from datalist
if (`${s.surname} ${s.name}` === val) {
surnameInput.value = s.surname;
if (nameInput) nameInput.value = s.name;
}
}
}
function onPriceSelect() {
const sel = document.getElementById('sfPrice');
const hoursInput = document.getElementById('sfHours');
if (!sel || !hoursInput) return;
const opt = sel.options[sel.selectedIndex];
if (opt && opt.dataset.hours) {
hoursInput.value = opt.dataset.hours;
} else {
hoursInput.value = '';
}
}
// ==================== VALIDATION FUNCTIONS ====================
function validateRequired(value) {
  return value.trim().length > 0;
}

function validatePhone(phone) {
  const regex = /^[+\d\s\-()]{6,20}$/;
  return regex.test(phone.trim());
}

function validateEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email.trim());
}

function validateNumber(value) {
  return !isNaN(parseFloat(value)) && isFinite(value);
}

function showToast(msg) {
const existing = document.getElementById('toastNotif');
if (existing) existing.remove();

toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:100001;background:rgba(15,23,42,0.95);border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:14px 24px;color:#fbbf24;font-weight:600;font-size:0.875rem;box-shadow:0 8px 32px rgba(0,0,0,0.5);backdrop-filter:blur(16px);animation:fadeInUp 0.3s ease-out;max-width:400px;';
toast.textContent = msg;
document.body.appendChild(toast);
setTimeout(() => {

}, 3000);
}

let currentLanguage = 'es';
let lastOpenModal = null;

function t(key) {
  if (translations[currentLanguage] && translations[currentLanguage][key]) {
    return translations[currentLanguage][key];
  }
  if (translations['es'] && translations['es'][key]) {
    return translations['es'][key];
  }
  return key;
}

function translateAll() {
  if (!translations[currentLanguage]) return;
  const lang = translations[currentLanguage];
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (lang[key]) el.textContent = lang[key];
  });
  
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (lang[key]) el.placeholder = lang[key];
  });
  
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.getAttribute('data-i18n-title');
    if (lang[key]) el.title = lang[key];
  });
  
  document.querySelectorAll('.field-label').forEach(el => {
    const text = el.textContent.trim();
    for (const [key, value] of Object.entries(lang)) {
      if (value.endsWith(':') && text === value) {
        el.textContent = lang[key] || text;
        break;
      }
    }
  });
}

function changeLanguage(lang) {
  currentLanguage = lang;
  renderAll();
  translateAll();
  
  const langName = {es: 'ESPAÑOL', ru: 'РУССКИЙ', en: 'ENGLISH'}[lang] || lang.toUpperCase();
  showToast(`${translations[currentLanguage].languageChanged} ${langName}`);
  
  if (lastOpenModal) {
    const modalToOpen = lastOpenModal;
    closeModal();
    openModal(modalToOpen);
  }
  
  try {
    localStorage.setItem('bembe_language', lang);
  } catch(e) { console.error('Error saving language:', e); }
}

// ==================== INIT ====================
function initApp() {
  loadData();

  // Load saved language preference
  try {
    const savedLang = localStorage.getItem('bembe_language');
    if (savedLang && translations[savedLang]) {
      currentLanguage = savedLang;
    }
  } catch(e) { console.error('Error loading language:', e); }

  renderAll();
  updateGridLayout();
  window.addEventListener('resize', updateGridLayout);
  
  // Online/Offline detection
  window.addEventListener('online', () => {
    isOnline = true;
    if (authToken && syncEnabled) syncWithServer();
  });
  window.addEventListener('offline', () => {
    isOnline = false;
    updateSyncStatus('offline');
  });
}

// ==================== SERVER SYNC (ADDED v3.0) ====================
const SERVER_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
let authToken = localStorage.getItem('bembe_auth_token') || null;
let currentUser = JSON.parse(localStorage.getItem('bembe_user') || 'null');
let isOnline = navigator.onLine;
let lastSyncTime = localStorage.getItem('bembe_last_sync') || null;
let autoSyncInterval = null;
let syncEnabled = false;

function updateSyncStatus(status) {
  const indicator = document.getElementById('syncIndicator');
  if (!indicator) return;
  const colors = { connected: '#10b981', syncing: '#3b82f6', error: '#f43f5e', offline: '#6b7280' };
  const labels = { connected: '☁️ Conectado', syncing: '🔄 Sincronizando...', error: '❌ Error Sync', offline: '💾 Modo Local' };
  indicator.style.color = colors[status] || colors.offline;
  indicator.textContent = labels[status] || labels.offline;
}

async function syncWithServer() {
  if (!authToken || !isOnline || !syncEnabled) { updateSyncStatus('offline'); return false; }
  try {
    updateSyncStatus('syncing');
    const response = await fetch(`${SERVER_URL}/api/sync`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, 'X-Client-Type': 'web' },
      body: JSON.stringify({ localData: appData, lastSync: lastSyncTime, clientInfo: { type: 'web', version: '3.0.0' } })
    });
    if (!response.ok) {
      if (response.status === 401 || response.status === 403) { showToast('⚠️ Sesión expirada'); handleLogout(); return false; }
      throw new Error('Error sync');
    }
    const result = await response.json();
    if (result.serverData && Object.keys(result.serverData).length > 0) {
      Object.assign(appData, result.serverData);
      saveData();
      renderAll();
    }
    lastSyncTime = result.timestamp;
    localStorage.setItem('bembe_last_sync', lastSyncTime);
    updateSyncStatus('connected');
    return true;
  } catch (error) {
    console.error('Sync error:', error);
    updateSyncStatus('error');
    return false;
  }
}

async function handleCloudLogin() {
  const email = prompt('📧 Email:');
  if (!email) return;
  const password = prompt('🔒 Contraseña:');
  if (!password) return;
  try {
    const response = await fetch(`${SERVER_URL}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, clientId: 'web' })
    });
    const result = await response.json();
    if (response.ok) {
      authToken = result.token;
      currentUser = result.user;
      localStorage.setItem('bembe_auth_token', authToken);
      localStorage.setItem('bembe_user', JSON.stringify(currentUser));
      syncEnabled = true;
      showToast('✅ Sesión iniciada - Sync activado');
      syncWithServer();
      startAutoSync();
    } else { showToast('❌ ' + result.error); }
  } catch (error) { showToast('❌ Error de conexión'); }
}

async function handleCloudRegister() {
  const email = prompt('📧 Email:');
  if (!email) return;
  const password = prompt('🔒 Contraseña (mínimo 8 caracteres):');
  if (!password || password.length < 8) { showToast('⚠️ Mínimo 8 caracteres'); return; }
  const name = prompt('👤 Nombre (opcional):') || email.split('@')[0];
  try {
    const response = await fetch(`${SERVER_URL}/api/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name, clientId: 'web' })
    });
    const result = await response.json();
    if (response.ok) {
      authToken = result.token;
      currentUser = result.user;
      localStorage.setItem('bembe_auth_token', authToken);
      localStorage.setItem('bembe_user', JSON.stringify(currentUser));
      syncEnabled = true;
      showToast('✅ Cuenta creada - Sync activado');
      syncWithServer();
      startAutoSync();
    } else { showToast('❌ ' + result.error); }
  } catch (error) { showToast('❌ Error de conexión'); }
}

function handleLogout() {
  authToken = null;
  currentUser = null;
  syncEnabled = false;
  localStorage.removeItem('bembe_auth_token');
  localStorage.removeItem('bembe_user');
  if (autoSyncInterval) clearInterval(autoSyncInterval);
  updateSyncStatus('offline');
  showToast('✅ Sesión cerrada - Modo local');
}

function startAutoSync() {
  if (autoSyncInterval) clearInterval(autoSyncInterval);
  autoSyncInterval = setInterval(() => {
    if (authToken && isOnline && syncEnabled) { syncWithServer(); }
  }, 5 * 60 * 1000);
}

async function handleSyncManual() {
  if (!authToken || !syncEnabled) {
    const choice = confirm('⚠️ Necesitas cuenta en la nube para sincronizar.\n\n¿Crear cuenta ahora?');
    if (choice) handleCloudRegister();
    return;
  }
  await syncWithServer();
}

// Override saveData to include cloud sync
const originalSaveData = saveData;
saveData = function() {
  try {
    localStorage.setItem('bembe_app_data', JSON.stringify(appData));
  } catch(e) {
    console.error('Error saving data:', e);
    showToast("⚠️ Error al guardar datos. Espacio insuficiente");
    handleExport();
  }
};
