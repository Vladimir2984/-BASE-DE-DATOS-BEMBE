<!-- BEMBE Auto-Updater Launcher v3.1.2 -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BEMBE - Actualizando...</title>
<style>
body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:radial-gradient(ellipse at center,#0c2248 0%,#020a18 70%); color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.container { text-align:center; max-width:600px; padding:40px; }
h1 { font-size:2.5rem; background:linear-gradient(135deg,#fbbf24,#f59e0b,#fbbf24); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; }
.progress { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:9999px; overflow:hidden; margin:20px 0; }
.progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#3b82f6,#fbbf24); border-radius:9999px; transition:width 0.3s; }
.status { color:rgba(147,197,253,0.7); font-size:0.875rem; margin:10px 0; }
.error { color:#f87171; }
.success { color:#10b981; }
</style>
</head>
<body>
<div class="container">
<h1>✦ BEMBE ✦</h1>
<div id="status" class="status">Verificando actualización...</div>
<div class="progress"><div id="progress" class="progress-bar"></div></div>
<div id="message" style="font-size:0.75rem;color:rgba(147,197,253,0.5);margin-top:20px;"></div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/Vladimir2984/-BASE-DE-DATOS-BEMBE/master/CODIGO%20OK.html';
const VERSION_KEY = 'bembe_last_update_check';
const APP_FILE = 'CODIGO OK.html';

async function updateProgress(percent, status, message) {
  document.getElementById('progress').style.width = percent + '%';
  document.getElementById('status').textContent = status;
  if (message) document.getElementById('message').textContent = message;
}

async function checkAndUpdate() {
  try {
    await updateProgress(10, 'Conectando con GitHub...', 'Verificando última versión');
    
    // Check if there's a newer version on GitHub
    const response = await fetch(GITHUB_RAW, { method: 'HEAD', cache: 'no-cache' });
    
    if (!response.ok) {
      throw new Error('No se pudo conectar con GitHub');
    }
    
    const lastModified = response.headers.get('Last-Modified');
    const lastCheck = localStorage.getItem(VERSION_KEY);
    
    // If we checked less than 1 hour ago and no update needed, skip
    if (lastCheck && lastModified && (Date.now() - parseInt(lastCheck)) < 3600000) {
      await updateProgress(50, 'Versión actual verificada', 'Abriendo aplicación...');
      setTimeout(() => openApp(), 500);
      return;
    }
    
    await updateProgress(30, 'Descargando última versión...', 'Esto puede tomar unos segundos');
    
    // Download the latest version
    const appResponse = await fetch(GITHUB_RAW);
    if (!appResponse.ok) throw new Error('Error descargando aplicación');
    
    const latestCode = await appResponse.text();
    
    await updateProgress(60, 'Verificando integridad...', 'Comprobando que el archivo es válido');
    
    // Verify it's a valid BEMBE app
    if (!latestCode.includes('BEMBE') || !latestCode.includes('appData')) {
      throw new Error('Archivo descargado no es válido');
    }
    
    await updateProgress(80, 'Guardando actualización...', 'Preparando para abrir');
    
    // Save to localStorage as cached version
    localStorage.setItem('bembe_cached_app', latestCode);
    localStorage.setItem(VERSION_KEY, Date.now().toString());
    localStorage.setItem('bembe_cache_date', lastModified || new Date().toISOString());
    
    await updateProgress(100, '¡Actualización completada!', 'Abriendo aplicación...');
    
    // Open the cached (latest) version
    setTimeout(() => openApp(), 1000);
    
  } catch (error) {
    console.error('Update error:', error);
    
    // If update fails, try to open cached version
    const cached = localStorage.getItem('bembe_cached_app');
    if (cached) {
      await updateProgress(100, 'Usando versión en caché', 'Abriendo aplicación...');
      setTimeout(() => openApp(), 1000);
    } else {
      // If no cache, redirect to local file
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = '⚠️ No se pudo actualizar';
      document.getElementById('message').textContent = 'Abriendo versión local...';
      
      setTimeout(() => {
        window.location.href = 'CODIGO OK.html';
      }, 2000);
    }
  }
}

function openApp() {
  const cached = localStorage.getItem('bembe_cached_app');
  if (cached) {
    // Open cached version as blob
    const blob = new Blob([cached], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.location.href = url;
  } else {
    // Fallback to local file
    window.location.href = 'CODIGO OK.html';
  }
}

// Start update process
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(checkAndUpdate, 500);
});
</script>
</body>
</html>
